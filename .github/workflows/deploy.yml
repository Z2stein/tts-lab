name: Build and Deploy to k3s via Helm

on:
  push:
    branches:
      - '**'
  delete:
    branches:
      - '**'
  pull_request:
    types:
      - closed

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      namespace: ${{ steps.vars.outputs.namespace }}
      release_name: ${{ steps.vars.outputs.release_name }}
      host: ${{ steps.vars.outputs.host }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      owner: ${{ steps.registry.outputs.owner }}
      app_slug: ${{ steps.repo_config.outputs.app_slug }}
      backend_image_name: ${{ steps.repo_config.outputs.backend_image_name }}
      frontend_image_name: ${{ steps.repo_config.outputs.frontend_image_name }}
    steps:
      - name: Validate required GHCR token
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_TOKEN}" ]; then
            echo "::error title=Missing GHCR_TOKEN::Set repository secret GHCR_TOKEN with a long-lived token before running deployments."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute shared repo config
        id: repo_config
        env:
          APP_SLUG: ${{ vars.APP_SLUG }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          shared/deployment/repo_config.sh "$APP_SLUG" "$REPO_NAME" >> "$GITHUB_OUTPUT"

      - name: Compute deployment variables
        id: vars
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          SERVER_IP: ${{ vars.HETZNER_HOST }}
          GIT_SHA: ${{ github.sha }}
          APP_SLUG: ${{ steps.repo_config.outputs.app_slug }}
        run: |
          set -euo pipefail
          SERVER_IP="${SERVER_IP:-${{ vars.HETZNER_HOST }}}"
          scripts/deployment_vars.sh deploy "$BRANCH_NAME" "$SERVER_IP" "$GIT_SHA" >> "$GITHUB_OUTPUT"


      - name: Compute registry owner
        id: registry
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          echo "owner=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.registry.outputs.owner }}/${{ steps.repo_config.outputs.backend_image_name }}:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.registry.outputs.owner }}/${{ steps.repo_config.outputs.backend_image_name }}:${{ steps.vars.outputs.branch_alias_tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.registry.outputs.owner }}/${{ steps.repo_config.outputs.frontend_image_name }}:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.registry.outputs.owner }}/${{ steps.repo_config.outputs.frontend_image_name }}:${{ steps.vars.outputs.branch_alias_tag }}

      - name: Verify pushed images are pullable
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "ghcr.io/${{ steps.registry.outputs.owner }}/${{ steps.repo_config.outputs.backend_image_name }}:${{ steps.vars.outputs.image_tag }}" >/dev/null
          docker buildx imagetools inspect "ghcr.io/${{ steps.registry.outputs.owner }}/${{ steps.repo_config.outputs.frontend_image_name }}:${{ steps.vars.outputs.image_tag }}" >/dev/null

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Validate required GHCR token
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_TOKEN}" ]; then
            echo "::error title=Missing GHCR_TOKEN::Set repository secret GHCR_TOKEN with a long-lived token before running deployments."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ vars.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via Helm on k3s
        env:
          HOST: ${{ vars.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          NAMESPACE: ${{ needs.build.outputs.namespace }}
          RELEASE_NAME: ${{ needs.build.outputs.release_name }}
          APP_HOST: ${{ needs.build.outputs.host }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN }}
          GHCR_OWNER: ${{ needs.build.outputs.owner }}
          BACKEND_IMAGE_NAME: ${{ needs.build.outputs.backend_image_name }}
          FRONTEND_IMAGE_NAME: ${{ needs.build.outputs.frontend_image_name }}
        run: |
          set -euo pipefail
          ssh "$USER@$HOST" "mkdir -p /opt/tts-lab/charts"
          scp -r charts/tts-lab "$USER@$HOST:/opt/tts-lab/charts/"

          ssh "$USER@$HOST" bash -s -- "$NAMESPACE" "$RELEASE_NAME" "$APP_HOST" "$IMAGE_TAG" "$GHCR_USERNAME" "$GHCR_PASSWORD" "$GHCR_OWNER" "$FRONTEND_IMAGE_NAME" "$BACKEND_IMAGE_NAME" <<'EOF'
            set -euo pipefail
            NAMESPACE="$1"
            RELEASE_NAME="$2"
            APP_HOST="$3"
            IMAGE_TAG="$4"
            GHCR_USERNAME="$5"
            GHCR_PASSWORD="$6"
            GHCR_OWNER="$7"
            FRONTEND_IMAGE_NAME="$8"
            BACKEND_IMAGE_NAME="$9"

            kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

            kubectl -n "$NAMESPACE" create secret docker-registry ghcr-pull-secret \
              --docker-server=ghcr.io \
              --docker-username="$GHCR_USERNAME" \
              --docker-password="$GHCR_PASSWORD" \
              --dry-run=client -o yaml | kubectl apply -f -

            helm upgrade --install "$RELEASE_NAME" /opt/tts-lab/charts/tts-lab \
              --namespace "$NAMESPACE" \
              --set ingress.host="$APP_HOST" \
              --set frontend.image.repository=ghcr.io/$GHCR_OWNER/$FRONTEND_IMAGE_NAME \
              --set frontend.image.tag="$IMAGE_TAG" \
              --set backend.image.repository=ghcr.io/$GHCR_OWNER/$BACKEND_IMAGE_NAME \
              --set backend.image.tag="$IMAGE_TAG" \
              --set imagePullSecrets[0].name=ghcr-pull-secret
          EOF

      - name: Publish deployment URL
        run: |
          {
            echo "### Deployment Summary"
            echo ""
            echo "**URL:** [http://${{ needs.build.outputs.host }}](http://${{ needs.build.outputs.host }})"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Deployment URL::http://${{ needs.build.outputs.host }}"

  cleanup-feature:
    if: github.event_name == 'delete' || (github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute cleanup variables
        id: vars
        env:
          DELETE_BRANCH: ${{ github.event.ref }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          SERVER_IP: ${{ vars.HETZNER_HOST }}
        run: |
          set -euo pipefail
          BRANCH_NAME="$DELETE_BRANCH"
          if [ -n "${PR_BRANCH:-}" ] && [ "$PR_BRANCH" != "null" ]; then
            BRANCH_NAME="$PR_BRANCH"
          fi
          SERVER_IP="${SERVER_IP:-${{ vars.HETZNER_HOST }}}"
          scripts/deployment_vars.sh cleanup "$BRANCH_NAME" "$SERVER_IP" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH key
        if: steps.vars.outputs.skip_cleanup == 'false'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ vars.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Cleanup feature release and namespace
        if: steps.vars.outputs.skip_cleanup == 'false'
        env:
          HOST: ${{ vars.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          NAMESPACE: ${{ steps.vars.outputs.namespace }}
          RELEASE_NAME: ${{ steps.vars.outputs.release_name }}
        run: |
          set -euo pipefail
          ssh "$USER@$HOST" "helm uninstall '$RELEASE_NAME' -n '$NAMESPACE' || true; kubectl delete namespace '$NAMESPACE' --ignore-not-found=true"
