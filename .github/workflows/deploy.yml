name: Build and Deploy to k3s via Helm

on:
  push:
    branches:
      - '**'
  delete:
    branches:
      - '**'
  pull_request:
    types:
      - closed

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute deployment variables
        id: vars
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          SERVER_IP: ${{ vars.HETZNER_PUBLIC_IP }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SERVER_IP="${SERVER_IP:-${{ secrets.HETZNER_HOST }}}"
          scripts/deployment_vars.sh deploy "$BRANCH_NAME" "$SERVER_IP" "$GIT_SHA" >> "$GITHUB_OUTPUT"


      - name: Compute registry owner
        id: registry
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          echo "owner=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.registry.outputs.owner }}/tts-lab-backend:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.registry.outputs.owner }}/tts-lab-backend:${{ steps.vars.outputs.branch_alias_tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.registry.outputs.owner }}/tts-lab-frontend:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.registry.outputs.owner }}/tts-lab-frontend:${{ steps.vars.outputs.branch_alias_tag }}

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via Helm on k3s
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          NAMESPACE: ${{ steps.vars.outputs.namespace }}
          RELEASE_NAME: ${{ steps.vars.outputs.release_name }}
          APP_HOST: ${{ steps.vars.outputs.host }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          GHCR_OWNER: ${{ steps.registry.outputs.owner }}
        run: |
          set -euo pipefail
          ssh "$USER@$HOST" "mkdir -p /opt/tts-lab/charts"
          scp -r charts/tts-lab "$USER@$HOST:/opt/tts-lab/charts/"

          ssh "$USER@$HOST" bash -s -- "$NAMESPACE" "$RELEASE_NAME" "$APP_HOST" "$IMAGE_TAG" "$GHCR_USERNAME" "$GHCR_PASSWORD" "$GHCR_OWNER" <<'EOF'
            set -euo pipefail
            NAMESPACE="$1"
            RELEASE_NAME="$2"
            APP_HOST="$3"
            IMAGE_TAG="$4"
            GHCR_USERNAME="$5"
            GHCR_PASSWORD="$6"
            GHCR_OWNER="$7"

            kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

            kubectl -n "$NAMESPACE" create secret docker-registry ghcr-pull-secret \
              --docker-server=ghcr.io \
              --docker-username="$GHCR_USERNAME" \
              --docker-password="$GHCR_PASSWORD" \
              --dry-run=client -o yaml | kubectl apply -f -

            helm upgrade --install "$RELEASE_NAME" /opt/tts-lab/charts/tts-lab \
              --namespace "$NAMESPACE" \
              --set ingress.host="$APP_HOST" \
              --set frontend.image.repository=ghcr.io/$GHCR_OWNER/tts-lab-frontend \
              --set frontend.image.tag="$IMAGE_TAG" \
              --set backend.image.repository=ghcr.io/$GHCR_OWNER/tts-lab-backend \
              --set backend.image.tag="$IMAGE_TAG" \
              --set imagePullSecrets[0].name=ghcr-pull-secret
          EOF

      - name: Publish deployment URL
        run: |
          echo "::notice title=Deployment URL::http://${{ steps.vars.outputs.host }}"

  cleanup-feature:
    if: github.event_name == 'delete' || (github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    steps:
      - name: Compute cleanup variables
        id: vars
        env:
          DELETE_BRANCH: ${{ github.event.ref }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          SERVER_IP: ${{ vars.HETZNER_PUBLIC_IP }}
        run: |
          set -euo pipefail
          BRANCH_NAME="$DELETE_BRANCH"
          if [ -n "${PR_BRANCH:-}" ] && [ "$PR_BRANCH" != "null" ]; then
            BRANCH_NAME="$PR_BRANCH"
          fi
          SERVER_IP="${SERVER_IP:-${{ secrets.HETZNER_HOST }}}"
          scripts/deployment_vars.sh cleanup "$BRANCH_NAME" "$SERVER_IP" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH key
        if: steps.vars.outputs.skip_cleanup == 'false'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Cleanup feature release and namespace
        if: steps.vars.outputs.skip_cleanup == 'false'
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          NAMESPACE: ${{ steps.vars.outputs.namespace }}
          RELEASE_NAME: ${{ steps.vars.outputs.release_name }}
        run: |
          set -euo pipefail
          ssh "$USER@$HOST" "helm uninstall '$RELEASE_NAME' -n '$NAMESPACE' || true; kubectl delete namespace '$NAMESPACE' --ignore-not-found=true"
