name: Deploy to Hetzner

on:
  push:
    branches:
      - '**'
  delete:
    branches:
      - '**'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute deployment variables
        id: vars
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          HOST_IP: ${{ vars.HETZNER_HOST }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          SLUG=$(echo "$BRANCH_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')

          GHCR_OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')

          if [ -z "$SLUG" ]; then
            SLUG="preview"
          fi

          if [ "$BRANCH_NAME" = "main" ]; then
            ENVIRONMENT="production"
            SUBDOMAIN="main"
          elif [ "$BRANCH_NAME" = "develop" ]; then
            ENVIRONMENT="staging"
            SUBDOMAIN="develop"
          else
            ENVIRONMENT="preview"
            SUBDOMAIN="$SLUG"
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="${SLUG}-${SHORT_SHA}"
          COMPOSE_PROJECT_NAME="tts-${SLUG}"
          ROUTER_NAME="tts-${SLUG}"
          APP_HOST="${SUBDOMAIN}.${HOST_IP}.sslip.io"

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "compose_project_name=$COMPOSE_PROJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "router_name=$ROUTER_NAME" >> "$GITHUB_OUTPUT"
          echo "app_host=$APP_HOST" >> "$GITHUB_OUTPUT"
          echo "ghcr_owner=$GHCR_OWNER" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend E2E test
        working-directory: frontend
        run: npm run test:e2e

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Frontend smoke check
        run: ./scripts/frontend_smoke_check.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.ghcr_owner }}/tts-lab-backend:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.vars.outputs.ghcr_owner }}/tts-lab-backend:${{ steps.vars.outputs.slug }}-latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.ghcr_owner }}/tts-lab-frontend:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.vars.outputs.ghcr_owner }}/tts-lab-frontend:${{ steps.vars.outputs.slug }}-latest

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ vars.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          HOST: ${{ vars.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          GHCR_OWNER: ${{ steps.vars.outputs.ghcr_owner }}
          COMPOSE_PROJECT_NAME: ${{ steps.vars.outputs.compose_project_name }}
          ROUTER_NAME: ${{ steps.vars.outputs.router_name }}
          APP_HOST: ${{ steps.vars.outputs.app_host }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          set -euo pipefail
          ssh "$USER@$HOST" "mkdir -p /opt/tts-lab/scripts"
          scp compose.traefik.yaml compose.app.yaml "$USER@$HOST:/opt/tts-lab/"
          scp scripts/deploy_stack.sh "$USER@$HOST:/opt/tts-lab/scripts/deploy_stack.sh"

          ssh "$USER@$HOST" \
            "chmod +x /opt/tts-lab/scripts/deploy_stack.sh && \
             COMPOSE_PROJECT_NAME='$COMPOSE_PROJECT_NAME' \
             ROUTER_NAME='$ROUTER_NAME' \
             APP_HOST='$APP_HOST' \
             IMAGE_TAG='$IMAGE_TAG' \
             GHCR_OWNER='$GHCR_OWNER' \
             /opt/tts-lab/scripts/deploy_stack.sh"

      - name: Publish deployment URL
        env:
          DEPLOY_URL: http://${{ steps.vars.outputs.app_host }}
          ENVIRONMENT: ${{ steps.vars.outputs.environment }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "✅ Deployment finished for branch '$BRANCH_NAME' ($ENVIRONMENT)"
          echo "🔗 URL: $DEPLOY_URL"
          echo "::notice title=Deployment URL::$DEPLOY_URL"
          {
            echo "## Deployment abgeschlossen"
            echo ""
            echo "- Branch: \`$BRANCH_NAME\`"
            echo "- Environment: \`$ENVIRONMENT\`"
            echo "- URL: [$DEPLOY_URL]($DEPLOY_URL)"
          } >> "$GITHUB_STEP_SUMMARY"

  cleanup-preview:
    if: github.event_name == 'delete'
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ vars.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Compute stack name
        id: vars
        env:
          BRANCH_NAME: ${{ github.event.ref }}
        run: |
          set -euo pipefail

          if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "develop" ]; then
            echo "skip_cleanup=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SLUG=$(echo "$BRANCH_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')

          if [ -z "$SLUG" ]; then
            SLUG="preview"
          fi

          echo "skip_cleanup=false" >> "$GITHUB_OUTPUT"
          echo "compose_project_name=tts-${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Remove preview stack
        if: steps.vars.outputs.skip_cleanup == 'false'
        env:
          HOST: ${{ vars.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          COMPOSE_PROJECT_NAME: ${{ steps.vars.outputs.compose_project_name }}
        run: |
          set -euo pipefail
          ssh "$USER@$HOST" "mkdir -p /opt/tts-lab/scripts"
          scp scripts/remove_stack.sh "$USER@$HOST:/opt/tts-lab/scripts/remove_stack.sh"
          ssh "$USER@$HOST" \
            "chmod +x /opt/tts-lab/scripts/remove_stack.sh && \
             COMPOSE_PROJECT_NAME='$COMPOSE_PROJECT_NAME' \
             /opt/tts-lab/scripts/remove_stack.sh"
