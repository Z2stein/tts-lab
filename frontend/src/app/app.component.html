<main>
  <h1>Text Length App</h1>
  <p *ngIf="authStatus === 'loading'">Loading...</p>
  <ng-container *ngIf="authStatus === 'unauthenticated'">
    <p *ngIf="authError" class="error">{{ authError }}</p>
    <p>Please sign in to use the app.</p>
    <button type="button" (click)="loginWithGoogle()">Sign in with Google</button>
  </ng-container>
  <ng-container *ngIf="authStatus === 'authenticated' && currentUser">
    <p>Signed in as {{ currentUser.name }} ({{ currentUser.authMode }})</p>
    <button type="button" (click)="logout()">Logout</button>

    <form>
      <label for="text">Text</label>
      <input id="text" [formControl]="textControl" />
      <button type="button" (click)="submit()">Check length</button>
    </form>

    <p *ngIf="length !== null">Length: {{ length }}</p>
    <p *ngIf="error">{{ error }}</p>
  </ng-container>
</main>

<app-chatbot-widget></app-chatbot-widget>
