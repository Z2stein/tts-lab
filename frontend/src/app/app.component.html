<main>
  <h1>Text Length App</h1>
  <p *ngIf="currentUser">Signed in as {{ currentUser.name }} ({{ currentUser.authMode }})</p>
  <button *ngIf="!currentUser" type="button" (click)="loginWithGoogle()">Sign in with Google</button>

  <form (ngSubmit)="submit()">
    <label for="text">Text</label>
    <input id="text" [formControl]="textControl" />
    <button type="submit">Check length</button>
  </form>

  <p *ngIf="length !== null">Length: {{ length }}</p>
  <p *ngIf="error">{{ error }}</p>
</main>
