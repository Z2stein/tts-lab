nameOverride: ""
fullnameOverride: ""

# Namespace-lokales Pull Secret für GHCR.
imagePullSecrets:
  - name: ghcr-pull-secret

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/<owner>/tts-lab-frontend
    tag: latest
    pullPolicy: IfNotPresent
  livenessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  resources: {}
  service:
    type: ClusterIP
    port: 80

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/<owner>/tts-lab-backend
    tag: latest
    pullPolicy: IfNotPresent
  livenessProbe:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  resources: {}
  service:
    type: ClusterIP
    port: 8080
    createAlias: true
    aliasName: backend

ingress:
  enabled: true
  className: traefik
  host: tts-lab.<public-server-ip>.sslip.io
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    # secretName kann im Deployment per --set überschrieben werden
    secretName: tts-lab-tls

app:
  environment: feature
  baseUrl: http://localhost

auth:
  mode: mock
  googleSecretName: ""
  mockUser:
    id: mock-user-1
    email: mock.user@example.com
    name: Mock User
    roles: USER

chat:
  geminiSecretName: gemini-api
  geminiModel: gemini-2.5-flash
  provider: gemini
  realProviderOnFeatureBranches: false

chatbot:
  rateLimit:
    enabled: true
    window: 1h
    maxRequests: 100
    idHeader: X-User-Id
