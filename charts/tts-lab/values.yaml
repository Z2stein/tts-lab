nameOverride: ""
fullnameOverride: ""

# Namespace-lokales Pull Secret für GHCR.
imagePullSecrets:
  - name: ghcr-pull-secret

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/<owner>/tts-lab-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/<owner>/tts-lab-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    createAlias: true
    aliasName: backend

ingress:
  enabled: true
  className: traefik
  host: tts-lab.<public-server-ip>.sslip.io
  annotations: {}
