nameOverride: ""
fullnameOverride: ""

# Namespace-lokales Pull Secret für GHCR.
imagePullSecrets:
  - name: ghcr-pull-secret

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/z2stein/tts-lab-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/z2stein/tts-lab-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    # Muss aktiv bleiben, solange das Frontend intern backend:8080 erwartet.
    createAlias: true
    aliasName: backend

ingress:
  enabled: true
  className: traefik
  host: tts-lab.178.105.41.67.sslip.io
  annotations: {}
