nameOverride: ""
fullnameOverride: ""

imagePullSecrets:
  - name: ghcr-pull-secret

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/REPLACE_ME/tts-lab-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  livenessProbe:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/REPLACE_ME/tts-lab-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    createAlias: true
    aliasName: backend
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi
  livenessProbe:
    path: /health
    initialDelaySeconds: 20
    periodSeconds: 20
  readinessProbe:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10

ingress:
  enabled: true
  className: traefik
  host: main.REPLACE_WITH_HETZNER_HOST.sslip.io
  # Optional: mehrere Hosts (z. B. pro Feature-Branch).
  # Wenn gesetzt, werden diese Hosts statt ingress.host verwendet.
  hosts: []
  annotations: {}
