apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tts-lab.fullname" . }}-backend
  labels:
    {{- include "tts-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
          env:
            - name: AUTH_MODE
              value: {{ .Values.auth.mode | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.app.environment | quote }}
            - name: APP_BASE_URL
              value: {{ .Values.app.baseUrl | quote }}
            - name: CHATBOT_PROVIDER
              value: {{ .Values.chat.provider | quote }}
            - name: SPRING_AI_GOOGLE_GENAI_CHAT_OPTIONS_MODEL
              value: {{ .Values.chat.geminiModel | quote }}
            {{- if eq .Values.chat.provider "gemini" }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chat.geminiSecretName }}
                  key: api-key
            {{- end }}
            {{- if eq .Values.auth.mode "google" }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.googleSecretName }}
                  key: client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.googleSecretName }}
                  key: client-secret
            {{- else }}
            - name: MOCK_USER_ID
              value: {{ .Values.auth.mockUser.id | quote }}
            - name: MOCK_USER_EMAIL
              value: {{ .Values.auth.mockUser.email | quote }}
            - name: MOCK_USER_NAME
              value: {{ .Values.auth.mockUser.name | quote }}
            - name: MOCK_USER_ROLES
              value: {{ .Values.auth.mockUser.roles | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
