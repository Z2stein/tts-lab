{{- if .Values.backend.service.createAlias }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.service.aliasName }}
  labels:
    {{- include "tts-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: backend-alias
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
