{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tts-lab.fullname" . }}
  labels:
    {{- include "tts-lab.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    {{- $hosts := .Values.ingress.hosts }}
    {{- if and $hosts (gt (len $hosts) 0) }}
    {{- range $host := $hosts }}
    - host: {{ $host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "tts-lab.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.service.port }}
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ include "tts-lab.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.service.port }}
          - path: /login/oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ include "tts-lab.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.service.port }}
          - path: /logout
            pathType: Prefix
            backend:
              service:
                name: {{ include "tts-lab.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "tts-lab.fullname" $ }}-frontend
                port:
                  number: {{ $.Values.frontend.service.port }}
    {{- end }}
    {{- else }}
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "tts-lab.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ include "tts-lab.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /login/oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ include "tts-lab.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /logout
            pathType: Prefix
            backend:
              service:
                name: {{ include "tts-lab.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "tts-lab.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
    {{- end }}
{{- end }}
