apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tts-frontend
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - {{ .Values.ingress.entryPoint }}
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: tts-frontend
          port: {{ .Values.frontend.servicePort }}
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
