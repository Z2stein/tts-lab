services:
  backend:
    image: ghcr.io/${GHCR_OWNER}/tts-lab-backend:${IMAGE_TAG}
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_OWNER}/tts-lab-frontend:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.${ROUTER_NAME}.entrypoints=web
      - traefik.http.routers.${ROUTER_NAME}.rule=Host(`${APP_HOST}`)
      - traefik.http.services.${ROUTER_NAME}.loadbalancer.server.port=80

networks:
  traefik-public:
    external: true
