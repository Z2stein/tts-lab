<!doctype html>
<html lang="de" ng-app="landingApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Angular Landing Page</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        color: #1f2937;
      }

      .hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .card {
        background: #fff;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        max-width: 560px;
      }

      h1 {
        margin-top: 0;
      }

      p {
        margin-bottom: 0;
      }
    </style>
  </head>
  <body ng-controller="LandingController as vm">
    <main class="hero">
      <section class="card">
        <h1>{{ vm.title }}</h1>
        <p>{{ vm.subtitle }}</p>
      </section>
    </main>

    <script>
      angular.module('landingApp', []).controller('LandingController', function () {
        this.title = 'Hello World';
        this.subtitle = 'Einfache Landing Page mit Angular auf Port 80';
      });
    </script>
  </body>
</html>
